name: Update Provider Bindings

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update-providers:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install CDKTN CLI
        run: npm install --global cdktn-cli@0.22.1

      - name: Update provider constraints
        run: python update-providers.py

      - name: Detect constraint changes
        id: constraint-changes
        run: |
          if git diff --quiet -- cdktf.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate provider bindings
        if: steps.constraint-changes.outputs.changed == 'true'
        run: cdktn get --parallelism 1

      - name: Verify generated providers build
        if: steps.constraint-changes.outputs.changed == 'true'
        shell: bash
        run: |
          for csproj in .gen/*/*.csproj; do
            dotnet build "$csproj" -c Release
          done

      - name: Commit updated providers
        id: push-updates
        if: steps.constraint-changes.outputs.changed == 'true'
        run: |
          if git diff --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "No generated changes to commit."
            exit 0
          fi

          before_sha=$(git rev-parse HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cdktf.json .gen
          git commit -m "Update generated providers"
          after_sha=$(git rev-parse HEAD)
          git push

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "before_sha=$before_sha" >> "$GITHUB_OUTPUT"
          echo "after_sha=$after_sha" >> "$GITHUB_OUTPUT"

      - name: Trigger build workflow
        if: steps.push-updates.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            -f ref="${{ github.ref_name }}" \
            -f inputs[before_sha]="${{ steps.push-updates.outputs.before_sha }}" \
            -f inputs[after_sha]="${{ steps.push-updates.outputs.after_sha }}"
