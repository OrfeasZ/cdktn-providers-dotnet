name: Build and Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      before_sha:
        description: Previous commit SHA for selective provider publishing
        required: false
        type: string
      after_sha:
        description: Current commit SHA for selective provider publishing
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - ".gen/**"
      - "patch-projects.py"
      - ".github/workflows/build.yml"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select providers to publish
        id: selection
        env:
          SELECT_BEFORE: ${{ inputs.before_sha || github.event.before }}
          SELECT_AFTER: ${{ inputs.after_sha || github.sha }}
        run: >
          python select-providers-to-publish.py
          --before "$SELECT_BEFORE"
          --after "$SELECT_AFTER"
          --output "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.selection.outputs.should_publish == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Setup Python
        if: steps.selection.outputs.should_publish == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Patch projects
        if: steps.selection.outputs.should_publish == 'true'
        run: python patch-projects.py

      - name: Pack selected providers
        if: steps.selection.outputs.should_publish == 'true'
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/artifacts"

          if [ "${{ steps.selection.outputs.build_all }}" = "true" ]; then
            for csproj in .gen/*/*.csproj; do
              dotnet pack "$csproj" -c Release -o "${{ github.workspace }}/artifacts"
            done
            exit 0
          fi

          for provider in ${{ steps.selection.outputs.providers }}; do
            csproj=".gen/$provider/$provider.csproj"

            if [ ! -f "$csproj" ]; then
              echo "Expected project not found: $csproj"
              exit 1
            fi

            dotnet pack "$csproj" -c Release -o "${{ github.workspace }}/artifacts"
          done

      - name: NuGet login (OIDC trusted publishing)
        if: steps.selection.outputs.should_publish == 'true'
        uses: NuGet/login@v1
        id: login
        with:
          user: orfeasz

      - name: Push packages
        if: steps.selection.outputs.should_publish == 'true'
        run: |
          for pkg in artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
